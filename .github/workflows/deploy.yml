name: CI/CD Pipeline

on:
  push:
    branches: [ main ]  # PR merge = main으로의 push

jobs:
  # ── Job 1: 테스트 ──────────────────────────────────
  test:
    name: ① Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: test1234
          MYSQL_DATABASE: hyperreserve_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}

      - name: Run Tests
        run: ./gradlew test
        env:
          DB_URL: jdbc:mysql://localhost:3306/hyperreserve_test
          DB_USERNAME: root
          DB_PASSWORD: test1234
          REDIS_HOST: localhost
          JWT_SECRET: YIOGnXwiQxDKK0xCiPFoH1E6Cn4294ARACEMardjyJf

  # ── Job 2: 빌드 & 배포 ────────────────────────────
  build-and-deploy:
    name: ② Build & Deploy
    runs-on: ubuntu-latest
    needs: test  # 테스트 통과 후에만 실행

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Image Build & Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hyper-reserve:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/hyper-reserve:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/hyper-reserve:latest
            docker stop hyper-reserve || true
            docker rm hyper-reserve || true
            docker run -d \
              --name hyper-reserve \
              -p 8080:8080 \
              -e DB_URL=${{ secrets.DB_URL }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e REDIS_HOST=${{ secrets.REDIS_HOST }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              ${{ secrets.DOCKER_USERNAME }}/hyper-reserve:latest
